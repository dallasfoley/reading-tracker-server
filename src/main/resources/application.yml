spring:
  application:
    name: reading-tracker-server
  docker:
    compose:
      enabled: false
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  config:
    import: optional:file:.env[.properties]
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, loggers, env, beans, metrics, traces
  endpoint:
    health:
      show-details: when-authorized   # never / always / when-authorized
      probes:
        enabled: true                 # enables /liveness and /readiness
  metrics:
    tags:
      application: ${spring.application.name}  # adds tag to every metric
  info:
    git:
      mode: full    # expose git commit SHA, branch in /info
    build:
      enabled: true # expose Maven/Gradle build metadata